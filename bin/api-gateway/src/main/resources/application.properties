server.port=8080
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=quantity-service
spring.cloud.gateway.routes[1].uri=lb://QUANTITY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/quantities/**

spring.cloud.gateway.routes[2].id=history-service
spring.cloud.gateway.routes[2].uri=lb://HISTORY-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/history/**

# JWT Secret — must be same in all services
jwt.secret=mysecretkeymysecretkeymysecretkey12345

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG